name: "Đề xuất tính năng (Linh hoạt)"
description: "Đề xuất tính năng mới cho hệ thống bóng đá"
title: "[FEATURE]: "
labels: ["enhancement"] # Label mặc định, bạn có thể lọc theo cái này
body:
  - type: input
    id: module_name
    attributes:
      label: "Module/Phân hệ"
      placeholder: "Ví dụ: Thanh toán, Quản lý trọng tài, API..."
      description: "Nhập tên module bạn đang làm. Bạn có thể dùng tên này để search/filter sau này."
    validations:
      required: true
  - type: textarea
    id: user_story
    attributes:
      label: "User Story & Mô tả"
      placeholder: "Tôi muốn... để có thể..."
    validations:
      required: true
  - type: textarea
    id: specs
    attributes:
      label: "Chi tiết kỹ thuật"
      placeholder: "Các ràng buộc logic, Database hoặc API cần thiết cho tính năng này."
  - type: input
    id: filter_tag
    attributes:
      label: "Custom Tags (Để Filter)"
      placeholder: "Ví dụ: #frontend, #sprint-1, #urgent"
      description: "Bạn có thể nhập các tag riêng ở đây để dễ dàng lọc trong thanh search của GitHub."
