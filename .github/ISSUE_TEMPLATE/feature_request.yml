name: "🚀 Feature Request"
description: "Đề xuất tính năng mới cho dự án Quản lý bóng đá"
title: "[FEATURE]: "
labels: ["enhancement"] # Chỉ để nhãn chung, nhãn chi tiết sẽ chọn tay sau khi tạo
body:
  - type: markdown
    attributes:
      value: |
        ## 📌 Phân loại nhanh
        *Chọn thông tin bên dưới để team dễ dàng quản lý.*
  
  - type: dropdown
    id: iteration_choice
    attributes:
      label: "⏳ Iteration / Sprint"
      description: "Tính năng này thuộc giai đoạn nào?"
      options:
        - "Iteration 1 (Tuần 1-4)"
        - "Iteration 2 (Tuần 5-8)"
        - "Iteration 3 (Tuần 9-12)"
        - "Backlog"
    validations:
      required: true

  - type: checkboxes
    id: modules
    attributes:
      label: "🧩 Module liên quan"
      description: "Tích chọn module để team gán Label tương ứng."
      options:
        - label: "Quản lý Đặt sân (Booking)"
        - label: "Quản lý Giải đấu (Tournament)"
        - label: "Hệ thống & Phân quyền (Auth)"
        - label: "Thanh toán & Hóa đơn (Payment)"

  - type: markdown
    attributes:
      value: "---"

  - type: textarea
    id: description
    attributes:
      label: "💡 Mô tả tính năng"
      placeholder: "Mô tả chi tiết logic hoặc giao diện mong muốn..."
    validations:
      required: true

  - type: input
    id: reference_link
    attributes:
      label: "🔗 Link tham khảo"
      placeholder: "Link Figma, tài liệu thiết kế hoặc issue liên quan..."
